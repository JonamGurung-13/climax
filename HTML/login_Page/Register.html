<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Climax Cinemas - Register</title>
  <link rel="stylesheet" href="Register.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">🎬 Climax Cinemas</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Movies</a></li>
      <li><a href="#">Schedules</a></li>
      <li><a href="Login.html">Login</a></li>
      <li><a href="Register.html" class="btn-register">Register</a></li>
    </ul>
  </nav>

  <main class="signup-header">
    <div class="WelcomeMsg">
      <h2>Create Your <span style="color: #e50914;">Climax Cinemas</span> Account</h2>
      <p>Register now to book your favorite movies.</p>
    </div>

    <form action="register" method="POST" class="login-form">
      <div class="fname">
        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname" required>
      </div>

      <div class="lname">
        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname" required>
      </div>

      <div class="phone">
        <label for="phone">Phone No:</label>
        <input type="tel" id="phone" name="phone" required placeholder="98********">
      </div>

      <div class="email">
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required placeholder="example@email.com">
      </div>

      <div class="password">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required placeholder="********">
      </div>

      <div class="confirm-password">
        <label for="confirm-password">Confirm Password:</label>
        <input type="password" id="confirm-password" name="confirm-password" required placeholder="********">
      </div>

      <button type="submit" class="btn-login">Sign Up</button>
    </form>

    <p class="register-link">Already have an account? <a href="Login.html">Login here</a></p>
  </main>

  <footer class="footer">
    <p>© 2026 Climax Cinemas. All rights reserved.</p>
    <p>Pokhara, Nepal</p>
  </footer>
</body>
</html>
