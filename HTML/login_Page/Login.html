<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Climax Cinemas</title>
  <link rel="stylesheet" href="login.css">
</head>
<div>

  <nav class="navbar">
    <div class="nav-logo">🎬 Climax Cinemas</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Movies</a></li>
      <li><a href="#">Schedules</a></li>
      <li><a href="Login.html" class="btn-login">Login</a></li>
      <li><a href="Register.html" class="btn-register">Register</a></li>
    </ul>
  </nav>

  <!-- Login Form -->
        <div class="login-header">
          <div class="WelcomeMsg">
            <h2>Welcome to <span style="color: #e50914;">Climax Cinemas</span></h2>
            <p>Login to Your Account</p>
            </div>
        <form action="login" method="POST" class="login-form">
            <div class="email">
              <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="example@gmail.com">
            </div>
            <div class="password">
              <label for="password">Password:</label>
              <input type="password" id="password" name="password" required placeholder="********">
            </div>
            <button type="submit" class="btn-login">Sign In</button>
            </form>
            <br>
            <p class="register-link">Don't have an account? <a href="Register.html">Register here</a></p>
            </div>
            </div>

  <footer class="footer">
    <p>© 2026 Climax Cinemas. All rights reserved.</p>
    <p>Pokhara, Nepal</p>
  </footer>

</body>
</html>
